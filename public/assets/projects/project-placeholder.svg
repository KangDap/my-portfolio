<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Project preview placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1c1c" />
      <stop offset="100%" stop-color="#2b2b2b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9ca3af" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#e5e7eb" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />
  <rect x="80" y="80" width="1040" height="515" rx="24" fill="none" stroke="url(#accent)" stroke-width="3" />
  <g fill="#e5e7eb" font-family="Arial, sans-serif" font-size="32" opacity="0.8">
    <text x="120" y="180">Project Preview</text>
  </g>
  <g fill="#9ca3af" font-family="Arial, sans-serif" font-size="18" opacity="0.7">
    <text x="120" y="230">Replace this placeholder with your own project image.</text>
  </g>
  <g fill="#6b7280" opacity="0.6">
    <rect x="120" y="280" width="360" height="14" rx="7" />
    <rect x="120" y="310" width="520" height="14" rx="7" />
    <rect x="120" y="340" width="420" height="14" rx="7" />
  </g>
</svg>
